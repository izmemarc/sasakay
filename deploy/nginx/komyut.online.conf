server {

    server_name komyut.online www.komyut.online;
    root /var/www/sasakay;
    index index.html;

    # ---- Rate limit ----
    # Per-IP cap (30 r/s, burst 60). Soaks normal first-load asset
    # bursts; blocks runaway scripts. limit_req_status 429 set
    # globally in conf.d/rate-limits.conf.
    limit_req zone=rl_general burst=60 nodelay;

    # ---- Security headers (apply to all responses) ----
    # 1y HSTS with includeSubDomains + preload-eligible.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Block MIME-type sniffing — clients trust our Content-Type.
    add_header X-Content-Type-Options "nosniff" always;
    # Don't leak referrer to other origins (privacy + minor info-disclosure).
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restrict who can use sensitive browser APIs. Geolocation only on
    # our own origin; nothing else is needed by the app.
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=(), usb=()" always;
    # CSP — locked down to what the app actually loads.
    # - script/style/font/connect: self only (Inter is self-hosted).
    # - img: self + data: + OSM tile servers (a/b/c.tile.openstreetmap.org).
    # - style 'unsafe-inline' is required for Tailwind's compiled
    #   inline styles via React style={} — acceptable trade-off.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; connect-src 'self' https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # Disallow being framed by anyone (clickjacking belt-and-suspenders).
    add_header X-Frame-Options "DENY" always;

    # Service worker must not be cached.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Hashed asset bundles — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Route JSONs + data — revalidate every load.
    location ~* \.(json|geojson)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/geo+json image/svg+xml;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/komyut.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/komyut.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.komyut.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = komyut.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 default_server;
    listen [::]:80 default_server;

    server_name komyut.online www.komyut.online;
    return 404; # managed by Certbot




}
