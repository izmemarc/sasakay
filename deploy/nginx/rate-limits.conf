# Per-IP rate limit zones used by the sasakay/komyut.online site.
# - rl_general: normal page + asset traffic. 30 req/s allows the
#   initial burst of asset fetches on first load + a generous
#   browse rate. 10MB tracking memory ≈ 160k unique IPs.
# - rl_strict: tighter bucket reserved for any future state-changing
#   endpoints (none today; left in place for when we add them).
limit_req_zone $binary_remote_addr zone=rl_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=rl_strict:10m rate=5r/s;
limit_req_status 429;
